- author: SirWarock, AeraAulin, BarryNorfolk
  changes:
  - message: Refactored EVERYTHING PSIONIC RELATED! THE PSIONIC REFACTOR IS HERE OH
      MY FUCKING GOD IT TOOK SO LONG
    type: Tweak
  - message: Mindshields now shield your mind, wow! Mindswaps and Telegnosis are not
      possible with mindshields. MassMindswaps do not give a fuck about cheap nanotrasen
      equipment though.
    type: Tweak
  - message: Mindswaps do not unlink when one dies.
    type: Tweak
  - message: Mindswaps do not stun anymore or make an obvious statement. This is because
      we used upstreams version, and now we use DeltaV's version.
    type: Tweak
  - message: Psionics with the Dispel Power can now see psionically invisible entities.
    type: Tweak
  - message: Dispelling a psionic will stop active doAfters.
    type: Tweak
  - message: Fractured Form psionics will reset their forced swap timer when dispelled.
    type: Tweak
  - message: Added Ambrosia, a reagent gifted by the Oracle. It is VERY filling and
      speeds you up.
    type: Add
  - message: Added Nectar, same as above. It quenches your thirst and shields you
      from psionic influences, but lets you use your own.
    type: Add
  - message: Added Sanctus Sal, which shields and suppresses psionic activity when
      consumed.
    type: Add
  - message: Added Learnae, which suppresses psionic activity when consumed.
    type: Add
  - message: Hitting Mindswapped entities with the psionic knife will attempt to swap
      them back.
    type: Add
  - message: Hitting Psionics with the psionic knife has a chance to disable psionic
      usage for a short moment.
    type: Add
  - message: Metapsionic Pulse is now an Area of Effect around your cursor, and much
      smaller radius, making it easier to sus out psionics.
    type: Tweak
  - message: It is now more likely to be a psionic! Roles and Species account to a
      higher chance too.
    type: Tweak
  id: 2246
