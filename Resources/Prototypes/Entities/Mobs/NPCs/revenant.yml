- type: entity
  id: MobRevenant
  parent:
  - Incorporeal
  - BaseMob
  name: revenant
  description: A spooky ghostie.
  components:
  - type: Emag
    emagType: All
  - type: Input
    context: "ghost"
  - type: Spectral
  - type: MovementSpeedModifier
    baseWalkSpeed: 5 # DeltaV - was 6, slight nerf
    baseSprintSpeed: 5 # DeltaV - was 6, slight nerf
  - type: Sprite
    sprite: _DV/Mobs/Ghosts/revenant.rsi # DeltaV - Custom revenant sprite
    layers:
    - state: active
  - type: StatusEffects
    allowed:
    - Corporeal
    - EssenceRegen # Imp
  - type: Hands # Imp
    showInHands: false
    disableExplosionRecursion: true
  - type: Damageable
    damageContainer: ManifestedSpirit
    damageModifierSet: Spirit # DeltaV: Keep revenant extreme weakness to heat and bible
  - type: MeleeWeapon # Begin DeltaV additions
    soundHit:
        path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    angle: 90
    animation: WeaponArcClaw
    wideAnimation: WeaponArcClaw
    wideAnimationRotation: -90
    swingLeft: true
    attackRate: 0.3
    range: 1.0
    altDisarm: false
    damage:
      types:
        Slash: 2
        Soul: 2
  - type: CombatMode # end DeltaV additions
  - type: NoSlip
  - type: Eye
    drawFov: false
    visMask:
      - Normal
      - Ghost
  - type: ContentEye
    maxZoom: 1.2, 1.2
  - type: NameIdentifier
    group: GenericNumber
  - type: GhostRole
    makeSentient: true
    name: ghost-role-information-revenant-name
    description: ghost-role-information-revenant-description
    rules: ghost-role-information-antagonist-rules
    mindRoles:
    - MindRoleGhostRoleSoloAntagonist
    raffle:
      settings: default
  - type: GhostTakeoverAvailable
  - type: Revenant
    exorcismRequiresBibleUser: true # Imp - Escape hatch, change to false if revenant becomes too OP
    grindingRequiresSalt: false # Imp - Escape hatch, change to false if revenant becomes too OP # DeltaV - turn false while grinding system is broken
    # spawnOnDeathPrototype: EctoplasmRevenant # DeltaV - different prototype that contains more ectoplasm reagent for normality crystals, commented out
    malfunctionWhitelist:
      components:
      # emag lockers open
      # - EntityStorage # Trolling armory is very stale
      # emag doors open
      - Airlock
      # troll medical to help get kills
      - StasisBed
      - EmaggableMedibot
      # borg become killer
      # - EmagSiliconLaw # DeltaV - emag borg doesn't make sense
  - type: PointLight
    color: MediumPurple
    radius: 2
    softness: 1
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: Visibility
    layer: 2 #ghost vis layer
  - type: ActionGrant
    actions:
    - ActionRevenantShop
    - ActionRevenantHaunt # Imp - Haunt ability
  - type: Store
    categories:
    - RevenantAbilities
    currencyWhitelist:
    - StolenEssence
  - type: RandomMetadata
    nameSegments:
    - NamesRevenantType
    - NamesRevenantAdjective
    - NamesRevenantTheme
    nameFormat: name-format-revenant
  - type: Speech
    speechVerb: Ghost
  - type: Reactive
    groups:
      Acidic: [Touch]
  - type: Psionic # DeltaV - Revenant is of Noospheric Origin
  - type: Tag
    tags:
    - SlowImmune
    - KnockdownImmune
