          32:
            sprite: _Impstation/Mobs/Species/Allulalo/displacement.rsi
            state: glasses
      ears:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Allulalo/displacement.rsi
            state: ears
      mask:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Allulalo/displacement.rsi
            state: mask
      neck:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Allulalo/displacement.rsi
            state: neck
      outerClothing:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Allulalo/displacement.rsi
            state: outerClothing
      gloves:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Allulalo/displacement.rsi
            state: hands
      shoes:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Allulalo/displacement.rsi
            state: feet
      belt:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Allulalo/displacement.rsi
            state: belt
      back:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Allulalo/displacement.rsi
            state: back
      suitstorage:
        sizeMaps:
          32:
            sprite: _Impstation/Mobs/Species/Allulalo/displacement.rsi
            state: suitstorage
