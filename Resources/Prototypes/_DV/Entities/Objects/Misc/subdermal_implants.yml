- type: entity
  parent: BaseSubdermalImplant
  id: BionicVoiceMaskImplant
  categories: [ HideSpawnMenu ]
  name: bionic voice mask implant
  description: This implant lets its user adjust their voice to whoever they can think of.
  components:
  - type: SubdermalImplant
    implantAction: ActionChangeVoiceMaskImplant
  - type: VoiceMask
  - type: UserInterface
    interfaces:
      enum.VoiceMaskUIKey.Key:
        type: VoiceMaskBoundUserInterface

- type: entity
  parent: BionicVoiceMaskImplant
  id: BionicSyrinxImplant
  categories: [ HideSpawnMenu ]
  name: bionic syrinx implant
  description: This implant lets a harpy adjust their voice to whoever they can think of.
  components:
  - type: SubdermalImplant
    implantAction: ActionSyrinxChangeVoiceMask
    whitelist:
      components:
      - HarpySinger # Ensure this is only for harpies and if this component gets renamed, CHANGE IT TO THE NEW VALUE!!!

- type: entity
  parent: BaseSubdermalImplant
  id: WatchdogImplant
  categories: [ HideSpawnMenu ]
  name: watchdog implant
  description: This implant transmits a message on the security channel in case the user goes into critical state or if they die.
  components:
  - type: TriggerOnMobstateChange
    mobState:
    - Critical
    - Dead
  - type: RattleOnTrigger
    targetUser: true
    radioChannel: Security

- type: entity
  parent: BaseSubdermalImplant
  id: CentCommImplant
  name: centcomm implant
  description: This implant includes a MindShield and something labeled as "antag immune"? Whatever that is.
  categories: [ HideSpawnMenu ]
  components:
  - type: AddComponentsImplant
    componentsToAdd:
    - type: AntagImmune
    - type: MindShield
    - type: TargetObjectiveImmune

# Nukie implants

- type: entity
  parent: BaseSubdermalImplant
  id: HostageImplant
  name: hostage implant
  description: Perfect for all your hostage ops needs! Allows the implanted entity to be ignored by syndicate turrets.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
  - type: AddComponentsImplant
    componentsToAdd:
    - type: Pacified
      disallowDisarm: true
      disallowAllCombat: true
  - type: AddFactionsImplant
    factions:
    - Hostage

- type: entity
  parent: UplinkImplant
  id: NukeopsUplinkImplant
  name: uplink implant
  description: This implant lets the user access a hidden Nuclear Operative uplink at will.
  categories: [ HideSpawnMenu ]
  components:
  - type: Tag
    tags:
    - NukeOpsUplink

# NTAgent

- type: entity
  parent: [ BaseSubdermalImplant, StorePresetNanolink ]
  id: NanolinkSubImplant
  name: Nanolink implant
  description: This implant lets the user access a hidden NanoTrasen uplink at will.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    implantAction: ActionOpenNanolinkImplant
    whitelist:
      components:
      - Hands
  - type: Store
    balance:
      NanoCoin: 10
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
        requireInputValidation: false

- type: entity
  parent: ActionIntrinsicStore
  id: ActionOpenNanolinkImplant
  name: Open Nanolink
  description: Opens the NanoTrasen uplink embedded under your skin.
  components:
  - type: Action
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Objects/Devices/communication.rsi
      state: old-radio

#hitman

- type: entity
  parent: [ BaseSubdermalImplant ]
  id: HitmanCardImplant
  name: hitman card implant
  description: This implant lets the user make a calling card at will
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    implantAction: ActionCreateHitmanCard
  - type: TriggerOnActivateImplant
  - type: CreateHitmanCardOnTrigger

# K9 ID card implant

- type: entity
  parent: BaseSubdermalImplant
  id: K9IDCardImplant
  categories: [ HideSpawnMenu ]
  name: K9 IDCard implant
  description: A subdermal implant with a preloaded ID Card
  components:
  - type: SubdermalImplant
    whitelist:
      tags:
      - K9
  - type: ContainerContainer
    containers:
      subdermalIdCard: !type:Container { }
  - type: SubdermalIdCard
    idCardProto: K9OfficerIDCard

- type: entity
  parent: BaseSubdermalImplant
  id: UnrevivableImplantSyndicate
  name: true death implant
  description: This implant contains syndicate nanites that are designed to rapidly decompose your organs and DNA post-mortem. Once you inject this, there will be absolutely no way to bring you back.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    permanent: true
  - type: AddComponentsImplant
    componentsToAdd:
    - type: Unrevivable
      cloneable: false
      analyzable: false # We don't want to tip off that we're DAGD via health scans
      reasonMessage: defibrillator-unrevivable-syndicate-implant

- type: entity
  parent: BaseSubdermalImplant
  id: MicroBombImplantSyndicateDAGD
  name: micro-bomb implant
  description: This implant detonates the user after a few seconds upon activation or death.
  categories: [ HideSpawnMenu ]
  components:
  - type: SubdermalImplant
    permanent: true
    implantAction: ActionActivateMicroBomb
  - type: TimerTrigger
    delay: 5
    beepSound:
      path: /Audio/Machines/Nuke/general_beep.ogg
      params:
        volume: -2
  - type: TriggerOnMobstateChange
    mobState:
    - Dead
  - type: TriggerOnActivateImplant
  - type: ExplodeOnTrigger
    keysIn:
    - timer
  - type: GibOnTrigger
    targetUser: true
    keysIn:
    - timer
    deleteItems: true
  - type: Explosive
    explosionType: MicroBomb
    totalIntensity: 120
    intensitySlope: 3
    maxIntensity: 30
    canCreateVacuum: true
  - type: Tag
    tags:
    - SubdermalImplant
    - HideContextMenu
    - MicroBomb
