- type: entity
  parent: BasicHitscan
  id: WispLash
  name: wisp lash
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: muzzle_omni
    travelFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: beam_omni
    impactFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: impact_omni
  - type: HitscanBasicDamage
    damage:
      types:
        Soul: 8
        Shock: 8

