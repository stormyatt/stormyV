- type: entity
  parent: [HitmanRule]
  id: Hitman
  components:
  - type: AntagSelection
    agentName: hitman-round-end-agent-name
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ Hitman ]
      max: 2
      playerRatio: 30 #a bit more impactful than thief which DV has at 25 so
      lateJoinAdditional: true
      allowNonHumans: true
      multiAntagSetting: NotExclusive
      startingGear: HitmanGear
      mindRoles:
      - MindRoleHitman
      components:
      - type: AutoImplant
        implants:
        - HitmanCardImplant
      briefing:
        text: hitman-role-greeting-human
        color: yellow
        sound: "/Audio/_DV/Ambience/Antag/hitman_briefing_piano_between.ogg"
  - type: DynamicRuleCost
    cost: 100 # bit more than thief

- type: entity
  parent: [NTAgentRule]
  id: NTAgent
  components:
  - type: AntagRandomObjectives
    sets:
    - groups: NTAgentBigObjectiveGroup
      maxPicks: 1
    - groups: NTAgentSmallObjectiveGroup
      maxPicks: 1
    maxDifficulty: 100
  - type: AntagSelection
    agentName: NTAgent-round-end-name
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ NTAgent ]
      min: 1
      max: 3
      playerRatio: 20
      lateJoinAdditional: true
      allowNonHumans: true
      multiAntagSetting: NotExclusive
      blacklist:
        components:
        - AntagImmune
      briefing:
        text: NTAgent-role-greeting-human
        color: lightblue
        sound: /Audio/_DV/Ambience/Antag/centcomm_nt_agent.ogg
      mindRoles:
      - MindRoleNTAgent
      components:
      - type: AutoImplant
        implants:
        - RadioImplantCentcomm
        - NanolinkSubImplant
  - type: DynamicRuleCost
    cost: 50 # really arent that much more than thief
