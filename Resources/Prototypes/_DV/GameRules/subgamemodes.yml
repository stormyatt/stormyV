- type: entity
  parent: [HitmanRule]
  id: Hitman
  components:
  - type: AntagSelection
    agentName: hitman-round-end-agent-name
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ Hitman ]
      max: 2
      playerRatio: 30 #a bit more impactful than thief which DV has at 25 so
      lateJoinAdditional: true
      allowNonHumans: true
      multiAntagSetting: NotExclusive
      startingGear: HitmanGear
      mindRoles:
      - MindRoleHitman
      components:
      - type: AutoImplant
        implants:
        - HitmanCardImplant
      briefing:
        text: hitman-role-greeting-human
        color: yellow
        sound: "/Audio/_DV/Ambience/Antag/hitman_briefing_piano_between.ogg"
  - type: DynamicRuleCost
    cost: 100 # bit more than thief

- type: entity
  id: Conspirators
  components:
  - type: GameRule
    minPlayers: 30
  - type: AntagObjectives
    objectives:
    - ConspiratorPrepareObjective
  - type: ConspiratorRule
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    agentName: conspirator-round-end-agent-name # DeltaV - previously unset
    definitions:
    - prefRoles: [ Conspirator ]
      min: 3
      max: 6
      playerRatio: 10
      departmentDistribution: true # DeltaV - previously unset
      startingGear: ConspiratorGear
      blacklist: # DeltaV - Blacklist AntagImmune
        components:
        - AntagImmune
      briefing:
        text: conspirator-role-greeting
        color: "#724F29"
        sound: /Audio/_Harmony/Misc/conspirator_greeting.ogg
      components:
      - type: Conspirator
      - type: AutoImplant
        implants:
        - RadioImplantConspiracy
      mindRoles:
      - MindRoleConspirator
