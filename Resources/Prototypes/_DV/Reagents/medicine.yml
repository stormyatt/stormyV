- type: reagent
  id: Netinadone
  name: reagent-name-netinadone
  group: Medicine
  desc: reagent-desc-netinadone
  physicalDesc: reagent-physical-desc-sickly
  flavor: acid
  color: "#e3d56d"
  worksOnTheDead: true
  metabolisms:
    Bloodstream:
      effects:
      - !type:ReduceRotting
        seconds: 10
        conditions:
        - !type:TemperatureCondition
          max: 150.0
        - !type:MobStateCondition
          mobstate: Dead

- type: reagent
  id: Umbroxol
  name: reagent-name-umbroxol
  group: Medicine
  desc: reagent-desc-umbroxol
  physicalDesc: reagent-physical-desc-dark
  flavor: medicine
  color: "#211f3d"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Holy: -2
      - !type:HealthChange
        damage:
          types:
            Cold: 2

- type: reagent
  id: UnholyWater # going to be renamed later alongside holy water
  name: reagent-name-unholy-water
  group: Toxins
  desc: reagent-desc-unholy-water
  physicalDesc: reagent-physical-desc-menacing
  flavor: UnholyWater
  color: "#c4c4c4"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Cold: 1 # plan to change this when holy counterpart damage exists

- type: reagent
  id: Anodynafil
  name: reagent-name-anodynafil
  desc: reagent-desc-anodynafil
  flavor: tingly
  color: "#8FABA3"
  physicalDesc: reagent-physical-desc-sticky
  group: Medicine
  metabolisms:
    Bloodstream:
      effects:
      - !type:GenericStatusEffect
        key: Anesthesia
        component: Anesthesia
        time: 4.0
        type: Add
      - !type:GenericStatusEffect
        key: PainNumbness
        component: PainNumbness
        time: 8.0
        type: Add
      - !type:MovementSpeedModifier
        walkSpeedModifier: 0.5
        sprintSpeedModifier: 0.5

- type: reagent
  id: Photoxadone
  name: reagent-name-photoxadone
  desc: reagent-desc-photoxadone
  flavor: clean
  color: "#A695AD"
  physicalDesc: reagent-physical-desc-enigmatic
  group: Medicine
  worksOnTheDead: true
  metabolisms:
    Bloodstream:
      effects:
      - !type:EvenHealthChange
        conditions:
        - !type:TemperatureCondition
          max: 213.0
        damage:
          Metaphysical: -5

- type: reagent
  id: Stabilizine
  name: reagent-name-stabilizine
  group: Medicine
  desc: reagent-desc-stabilizine
  physicalDesc: reagent-physical-desc-thick
  flavor: medicine
  color: "#ff7db5"
  metabolisms:
    Bloodstream:
      effects:
      - !type:AdjustTemperature
        conditions:
        - !type:TemperatureCondition
          max: 293.15
        amount: 40000 # thermal energy, not temperature!
      - !type:AdjustTemperature
        conditions: # Increase the effect at lower temperatures, to reduce rubberbanding
        - !type:TemperatureCondition
          max: 253.15
        amount: 60000 # Remember, this adds with the above condition!
      - !type:AdjustTemperature
        conditions:
        - !type:TemperatureCondition
          min: 293.15
        amount: -10000

- type: reagent
  id: SanctusSal
  name: reagent-name-sanctussal
  group: Medicine
  desc: reagent-desc-sanctussal
  physicalDesc: reagent-physical-desc-salty
  flavor: medicine
  color: "#91C3F7"
  metabolisms:
    Bloodstream:
      metabolismRate: 0.5
      effects:
      - !type:ModifyStatusEffect
        effectProto: StatusEffectShieldedFromPsionics
        type: Add
        time: 60
      - !type:ModifyStatusEffect
        effectProto: StatusEffectPsionicsDisabled
        type: Add
        time: 60

- type: reagent
  id: CombatNanites
  name: reagent-name-combat-nanites
  group: Medicine
  desc: reagent-desc-combat-nanites
  physicalDesc: reagent-physical-desc-repairing
  flavor: prickly
  color: "#4da0bd"
  metabolisms:
    Bloodstream:
      metabolismRate: 0.5
      effects:
      - !type:ModifyBleed
        amount: -1.5
      - !type:ModifyBloodLevel
        amount: 2
      - !type:EvenHealthChange
        damage:
          Burn: -1.5
          Brute: -1.5
      - !type:HealthChange
        damage:
          types:
            Bloodloss: -2
            Radiation: -1
            Asphyxiation: -2
      - !type:HealthChange
        damage:
          types:
            Cellular: 0.12
