- type: markingsGroup
  id: Felinid
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ FelinidTailBasic ]
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ FelinidEarsBasic ]
    enum.HumanoidVisualLayers.Chest:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 6
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 6
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 6
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 6
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceFelinid
  name: felinid appearance
  components:
  - type: InitialBody
    organs:
      Torso: OrganFelinidTorso
      Head: OrganFelinidHead
      ArmLeft: OrganFelinidArmLeft
      ArmRight: OrganFelinidArmRight
      HandRight: OrganFelinidHandRight
      HandLeft: OrganFelinidHandLeft
      LegLeft: OrganFelinidLegLeft
      LegRight: OrganFelinidLegRight
      FootLeft: OrganFelinidFootLeft
      FootRight: OrganFelinidFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: OrganAnimalHeart
      Stomach: OrganVulpkaninStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Felinid
  - type: ScaleVisuals
    speciesScale: 0.75, 0.75

- type: entity
  parent:
  - AppearanceFelinid
  - BaseSpeciesMobOrganic
  id: MobFelinid
  name: Urist McCat
  components:
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.28
        density: 150
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Damageable
    damageModifierSet: Felinid
  - type: SlowOnDamage
    speedModifierThresholds:
      60: 0.85  # 0.7 is base speed.
      80: 0.75  # 0.5 is base speed.
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 4
        Piercing: 1
  - type: Speech
    speechSounds: Alto
    speechVerb: Felinid
    allowedEmotes: ['Meow', 'Hiss', 'Mew', 'Purr', 'Growl']
  - type: DamageOnHighSpeedImpact # Landing on all fours!
    damage:
      types:
        Blunt: 1
  - type: Stamina
    baseCritThreshold: 85
  - type: TypingIndicator
    proto: felinid
  - type: PseudoItem
    storedOffset: 0,17
    shape:
    - 0,0,1,4
    - 0,2,3,4
    - 4,0,5,4
  - type: Vocal
    wilhelm: "/Audio/Nyanotrasen/Voice/Felinid/cat_wilhelm.ogg"
    sounds:
      Male: MaleFelinid
      Female: FemaleFelinid
      Unsexed: MaleFelinid
  - type: ItemCougher
    item: Hairball
    action: ActionHairball
    coughPopup: hairball-cough
  - type: Felinid
  - type: NoShoesSilentFootsteps
  - type: Rootable # DeltaV - add rooting claws
    action: "ActionToggleRootableFelinid"
    transferRate: 0
    speedModifier: 0.1
    rootSound: "/Audio/Nyanotrasen/Voice/Felinid/cat_growl1.ogg"


- type: entity
  parent: OrganBase
  id: OrganFelinid
  abstract: true
  suffix: felinid

- type: entity
  parent: OrganFelinid
  id: OrganFelinidExternal
  abstract: true
  components:
  - type: Sprite
    scale: 0.8, 0.8
    sprite: Mobs/Species/Human/parts.rsi
  - type: VisualOrgan
    data:
      sprite: Mobs/Species/Human/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Felinid

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganFelinidExternal, OrganBaseTorso ]
  id: OrganFelinidTorso

- type: entity
  parent: [ OrganBaseHeadSexed, OrganFelinidExternal, OrganBaseHead ]
  id: OrganFelinidHead

- type: entity
  parent: [ OrganFelinidExternal, OrganBaseArmLeft ]
  id: OrganFelinidArmLeft

- type: entity
  parent: [ OrganFelinidExternal, OrganBaseArmRight ]
  id: OrganFelinidArmRight

- type: entity
  parent: [ OrganFelinidExternal, OrganBaseHandLeft ]
  id: OrganFelinidHandLeft

- type: entity
  parent: [ OrganFelinidExternal, OrganBaseHandRight ]
  id: OrganFelinidHandRight

- type: entity
  parent: [ OrganFelinidExternal, OrganBaseLegLeft ]
  id: OrganFelinidLegLeft

- type: entity
  parent: [ OrganFelinidExternal, OrganBaseLegRight ]
  id: OrganFelinidLegRight

- type: entity
  parent: [ OrganFelinidExternal, OrganBaseFootLeft ]
  id: OrganFelinidFootLeft

- type: entity
  parent: [ OrganFelinidExternal, OrganBaseFootRight ]
  id: OrganFelinidFootRight
